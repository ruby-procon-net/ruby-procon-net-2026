- name: まつもとゆきひろ
  title: 一般財団法人Rubyアソシエーション 理事長
  bio: プログラミング言語Rubyの開発者。1993年から開発を開始。株式会社ネットワーク応用通信研究所フェロー。島根県松江市在住、松江市名誉市民。
  message: インターネットの発達で、若い人たちのコンピューターへの接し方が極端に二分化されました。ただ単にユーザーとしてコンピューターを利用する大多数の人たちと、プログラミングを通じてコンピューターの持つ無限の可能性を引き出す人たちです。本コンテストの参加者は貴重な後者です。
  photo: matz.webp

- name: 江森 真由美
  title: 株式会社ケーシーエスキャロット 執行役員
  bio: 1997年入社、プログラミング未経験から開始。2004年Rubyで地震防災システム開発に従事。Rails Girls Japan メンバー。著書に『はじめてつくるWebアプリケーション』。
  message: 私たちの周りにはプログラムで動くたくさんの『モノ』があり、プログラミングすることでその仕組みを知ることができます。その仕組みを組み合わせると様々な課題を解決できるようになります。
  photo: emori.webp

- name: 塩井 美咲
  title: 株式会社エス・エム・エス
  bio: 元不登校生徒、通信制高校卒業生。2018年からプログラマーのキャリアを開始。2024年11月Rubyコミッターに就任。
  message: ソフトウェアはとても柔軟で可能性に満ちた存在です。ソフトウェアをつくる人は、自分がつくりたいと思う限りそれを自由に育てることができます。
  photo: shioi.webp

- name: 高橋 征義
  title: 一般社団法人日本Rubyの会 代表理事
  bio: 2004年に「日本Rubyの会」を設立。2010年に株式会社達人出版会を設立、現代表取締役。「高橋メソッド」の開発者。
  message: 何にせよ、自分で作ってみるといろんなことがわかったりします。それはコンピュータのしくみだったり、音楽やグラフィックの面白さや難しさだったり。
  photo: takahashi.webp

- name: 田中 和明
  title: 九州工業大学大学院 情報工学研究院 知的システム工学研究系 准教授
  bio: mruby, mruby/c開発者。組込みソフトウェア研究に従事。Rubyアソシエーション理事。軽量Rubyフォーラム理事。
  message: プログラミングは、自転車に乗るスキルに似たところがあると思います。プログラミングで、私たちはコンピュータを使えるようになります。
  photo: tanaka.webp

- name: 野田 哲夫
  title: 島根大学 名誉教授
  bio: 一橋大学大学院経済学研究科博士課程修了。島根大学法文学部教授。専門は情報経済学。Ruby City Matsue Project立ち上げに関わる。
  message: 中学校・高校の時に学んだプログラミングの知識が今の仕事に大いに役立っています。今後はもっと、いろんな分野でプログラミングの知識が必要とされる時代になってきます。
  photo: noda.webp

- name: 森 正弥
  title: 株式会社博報堂ＤＹホールディングス 執行役員 Chief AI Officer
  bio: Human-Centered AI Institute代表。内閣府AI戦略専門調査会委員。外資系コンサルティング会社を経てAI・先端技術の企業支援に従事。2024年4月に現職に就任。
  message: AIやIoT等、新しい技術はソフトウェアによりその価値が実現されており、プログラミングすることによって作られます。プログラミングを学ぶことは、社会を豊かにさせることにつながります。
  photo: mori.webp
