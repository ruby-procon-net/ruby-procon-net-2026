title: 中高生Rubyプログラミングコンテスト2026
description: 中高生Rubyプログラミングコンテスト2026
baseurl: ""
url: "https://2026.ruby-procon.net"

# SNS共有時の既定画像。記事は front matter の thumbnail が優先される。
# 1280x720（head.html が og:image:width/height でこの寸法を宣言している）。
# WebPはX/Facebookのクローラーが扱えないことがあるためJPEGにしている。
og_image: /assets/images/common/ogp.jpg

plugins:
  - jekyll-feed

# jekyll-feed の既定対象は _posts だが、このサイトの記事は articles コレクション。
# posts用フィードはgem側で常に生成され無効化できないため、慣例的な /feed.xml を
# articles に割り当て、空になるposts用は /feed/posts.xml へ退避させる。
feed:
  path: /feed/posts.xml
  collections:
    articles:
      path: /feed.xml

# exclude を指定するとJekyllの既定値が上書きされるため、既定分も明示する
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules/
  - vendor/
  - .sass-cache/
  - .jekyll-cache/
  - package.json
  - package-lock.json
  - Procfile
  - README.md
  - scripts/
  - _tailwind/

collections:
  articles:
    output: true
    permalink: /articles/:path/

defaults:
  - scope:
      path: ""
      type: articles
    values:
      layout: article
