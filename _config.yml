title: 中高生Rubyプログラミングコンテスト2026
description: 中高生Rubyプログラミングコンテスト2026
baseurl: ""
url: "https://2026.ruby-procon.net"

plugins:
  - jekyll-feed

include:
  - .well-known

# exclude を指定するとJekyllの既定値が上書きされるため、既定分も明示する
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules/
  - vendor/
  - .sass-cache/
  - .jekyll-cache/
  - package.json
  - package-lock.json
  - Procfile
  - README.md
  - scripts/
  - _tailwind/

collections:
  articles:
    output: true
    permalink: /articles/:path/

defaults:
  - scope:
      path: ""
      type: articles
    values:
      layout: article
